services:
    pa-app:
        image: vchychuzhko/personal-accountant:latest
        restart: unless-stopped
        ports:
            - "8996:80"
        environment:
            APP_ENV: prod
            DATABASE_URL: mysql://app:app@pa-db:3306/app?serverVersion=10.11.0-MariaDB
            DEFAULT_URI: http://localhost
        depends_on:
            - pa-db

    pa-db:
        image: mariadb:10.11
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: app
            MYSQL_USER: app
            MYSQL_PASSWORD: app
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - db-data:/var/lib/mysql

volumes:
    db-data:
